name: Build and Push TimeCalc Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip gitops]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            appleweek/timecalc:latest
            appleweek/timecalc:${{ env.SHORT_SHA }}

      - name: Update deployment manifest to the new image tag
        run: |
          sed -i "s|image: appleweek/timecalc:.*|image: appleweek/timecalc:${SHORT_SHA}|" k8s/deployment.yaml

      - name: Commit updated deployment manifest
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "Deployment manifest already uses image tag ${SHORT_SHA}; no commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): update timecalc image to ${SHORT_SHA} [skip gitops]"
          git push
