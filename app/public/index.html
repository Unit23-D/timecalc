<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TimeCalc</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>TimeCalc v1.1.1</h1>

    <section class="card">
      <label>
        Start time
        <input id="startTime" type="time" />
      </label>

      <label>
        End time
        <input id="endTime" type="time" />
      </label>

      <div class="presets">
        <button data-preset="Weekday 06:20" data-time="06:20">Weekday 6:20</button>
        <button data-preset="Weekend 10:00" data-time="10:00">Weekend 10:00</button>
      </div>

      <div class="result">
        <div class="big" id="durationText">—</div>
        <div class="small" id="endsAtText">—</div>
      </div>

      <div class="actions">
        <button id="saveBtn">Save</button>
        <button id="refreshNowBtn">Set start = now</button>
      </div>
      <div class="status" id="statusText" aria-live="polite"></div>
    </section>

    <section class="card">
      <h2>Recent</h2>
      <div id="recent"></div>
      <div class="actions">
        <button id="clearAllBtn" type="button">Clear All</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
