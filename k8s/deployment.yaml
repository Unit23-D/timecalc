apiVersion: apps/v1
kind: Deployment
metadata:
  name: timecalc
  labels:
    app: timecalc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timecalc
  template:
    metadata:
      labels:
        app: timecalc
    spec:
      containers:
        - name: timecalc
          # CI updates this tag to the pushed commit SHA so Argo CD deploys immutably.
          image: appleweek/timecalc:7df277e
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            # The app stores its SQLite database in the mounted Longhorn-backed volume.
            - name: TIMECALC_DB_PATH
              value: /data/timecalc.sqlite
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timecalc-data
